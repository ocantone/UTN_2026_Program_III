<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora en JS</title> 
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            flex-direction: column; /* Alinea los hijos uno debajo del otro */
            align-items: center;
            background-color: #f0f0f0;
        }

        .container {
            border: 1px solid #000000;
            text-align: center;
            background-color: #fff;
            padding: 20px;
            padding-top: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        .display {
            border: 1px solid #000000;
            width: 90%;
            margin-bottom: 20px;
            text-align: right; 
            font-size: 20px; 
            padding: 10px;
        }

        .botones button {
            width: 50px;
            height: 50px;
            margin: 5px;
            font-size: 18px;
        }
        .botones button:hover {
           background-color: #d0d0d0; /* Se oscurece un poco al pasar el mouse */
        }     
        /*.botones button:nth-child(4n) {*/
        .botones button:nth-of-type(4n) {            
             background-color: #2196F3;
             color: white;
             border: none;
        }  
        .botones button:active {
            transform: scale(0.95); /* El botón se achica un poquito al tocarlo */
        }
        #igual {
            width: 245px;
            background-color: #4CAF50;
            color: white;
        }
</style>
<script>
        function agregaAlDisplay(valor) {
            document.getElementById('display').value += valor;
        }

        function borraDisplay() {
            document.getElementById('display').value = '';
        }

        function calcula() {
                const resultado = eval(document.getElementById('display').value);
                document.getElementById('display').value = resultado;
            //Exepciones para evitar que el programa se caiga si el usuario ingresa una expresión no válida.
            /*           try {
                // Intenta realizar la operación utilizando eval. 
                const resultado = eval(document.getElementById('display').value);
                document.getElementById('display').value = resultado;
            } 
            // Si hay un error (por ejemplo, una expresión mal formada), muestra "Error" en el display.
            catch (error) {
                document.getElementById('display').value = 'Error';
            }
*/                
        }

    </script>

</head>
<body> 
    <div>    <h1>Calculadora</h1>   </div>

    <div class="container">
     

         <div >
             <input type="text" class="display" id="display" disabled >
         </div>

         <div class="botones">
            <button onclick="agregaAlDisplay('7')">7</button>
            <button onclick="agregaAlDisplay('8')">8</button>
            <button onclick="agregaAlDisplay('9')">9</button>
            <button onclick="agregaAlDisplay('/')">/</button><br>
            <button onclick="agregaAlDisplay('4')">4</button>
            <button onclick="agregaAlDisplay('5')">5</button>
            <button onclick="agregaAlDisplay('6')">6</button>
            <button onclick="agregaAlDisplay('*')">*</button><br>
            <button onclick="agregaAlDisplay('1')">100</button>
            <button onclick="agregaAlDisplay('2')">2</button>
            <button onclick="agregaAlDisplay('3')">3</button>
            <button onclick="agregaAlDisplay('-')">-</button><br>
            <button onclick="borraDisplay()">  C    </button>
            <button onclick="agregaAlDisplay('0')">0</button>
            <button onclick="agregaAlDisplay('.')">.</button>
            <button onclick="agregaAlDisplay('+')">+</button><br>
            <button id="igual" onclick="calcula()">=</button>
            </div>

</body>
</html>

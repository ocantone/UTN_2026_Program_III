<!DOCTYPE html>
<html>
<body>
<h1>JavaScript HTML DOM</h1>
<h2>Usando getElementById() e innerHTML</h2>

<p id="parrafo"></p>

<script>
// Access a paragraph Element
const miTexto = document.getElementById("parrafo");

// Change the content of the Element
miTexto.innerHTML = "Texto agregado usando innerHTML y getElementById()";
</script>



</body>
</html>

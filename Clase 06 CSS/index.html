<div class="div_2">
<p> Hijo 1</p>
<p> Hijo 2</p>
<p> Hijo 3</p>
<p> Hijo 4</p>
<p> Hijo 5</p>
<p> Hijo 6</p>
<p> Hijo 7</p>

</div>

<script>
const x = document.querySelectorAll(".div_2 p:nth-child(odd)");
for (let i = 0; i < x.length; i++) {
    x[i].style.backgroundColor = "#ff0000";
}  


const y = document.querySelectorAll(".div_2 p:nth-child(even)");
for (let i = 0; i < x.length; i++) {
    y[i].style.backgroundColor = "#0000ff";
}  
</script>
